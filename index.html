<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>蝙蝠回聲 ECHO OF THE BAT｜訓練場版</title>
<style>
    * {
        box-sizing: border-box;
        user-select: none;
    }

    body {
        margin: 0;
        background: #050509;
        color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    canvas {
        display: block;
        background: radial-gradient(circle, #171727 0%, #06060c 70%);
    }

    #overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.75);
        z-index: 10;
    }

    #panel {
        width: 720px;
        max-width: 90vw;
        padding: 24px;
        border: 2px solid #777;
        background: #11111d;
        border-radius: 12px;
        text-align: center;
    }

    button {
        margin: 8px;
        padding: 12px 18px;
        border: none;
        border-radius: 8px;
        background: #33334d;
        color: white;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #55557a;
    }

    #trainer {
        position: fixed;
        right: 12px;
        top: 12px;
        z-index: 20;
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-width: 170px;
    }

    #trainer button {
        margin: 0;
        padding: 8px 10px;
        font-size: 13px;
        background: #22223a;
        color: white;
        border: 1px solid #666;
        border-radius: 6px;
        text-align: left;
    }

    #trainer button:hover {
        background: #3b3b63;
    }

    #trainer .title {
        font-size: 13px;
        color: #ddd;
        background: rgba(0,0,0,0.35);
        border: 1px solid #555;
        border-radius: 6px;
        padding: 8px 10px;
        text-align: center;
    }

    #trainer .help {
        font-size: 12px;
        line-height: 1.45;
        color: #cfcfe8;
        background: rgba(0,0,0,0.28);
        border: 1px solid #444;
        border-radius: 6px;
        padding: 8px 10px;
    }

</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="trainer">
    <div class="title">訓練場</div>
    <div class="help">
        快捷鍵：1幼 / 2血 / 3聲 / 4影<br>
        F1無敵｜F2敵動｜F3自動生怪<br>
        F4近戰｜F5遠程｜F6重甲｜F7 Boss｜F8清場｜F9進化
    </div>
    <button id="btnInvincible" onclick="toggleInvincible(this)">F1 無敵：OFF</button>
    <button id="btnEnemyMove" onclick="toggleEnemyMove(this)">F2 敵人移動：ON</button>
    <button id="btnAutoSpawn" onclick="toggleAutoSpawn(this)">F3 自動生怪：OFF</button>
    <button onclick="setForm('Young Bat')">1 切換：幼蝠</button>
    <button onclick="setForm('Blood Bat')">2 切換：血蝠</button>
    <button onclick="setForm('Echo Bat')">3 切換：回聲蝠</button>
    <button onclick="setForm('Shadow Bat')">4 切換：影蝠</button>
    <button onclick="spawnEnemy('melee', true)">F4 滑鼠位置放近戰怪</button>
    <button onclick="spawnEnemy('ranged', true)">F5 滑鼠位置放遠程怪</button>
    <button onclick="spawnEnemy('heavy', true)">F6 滑鼠位置放重甲怪</button>
    <button onclick="spawnBoss(true)">F7 放 Boss</button>
    <button onclick="clearEnemies()">F8 清場</button>
    <button onclick="giveXp()">F9 直接進化</button>
</div>


<div id="overlay">
    <div id="panel">
        <h1 id="overlayTitle">選擇進化</h1>
        <p id="overlayText"></p>
        <div id="buttons"></div>
    </div>
</div>

<script>
const canvas = document.getElementById("game");
const GAME_VERSION = "v0.2.3 訓練場快捷鍵版";
const BUILD_DATE = "2026-06-05";
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const keys = {};
const mouse = { x: canvas.width / 2, y: canvas.height / 2, down: false };

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;

    if (e.key === " ") dash();
    if (e.key.toLowerCase() === "e") echoWave();
    if (e.key.toLowerCase() === "q") useSkill();

    // 訓練場快捷鍵
    if (e.key === "1") setForm("Young Bat");
    if (e.key === "2") setForm("Blood Bat");
    if (e.key === "3") setForm("Echo Bat");
    if (e.key === "4") setForm("Shadow Bat");

    if (e.key === "F1") { e.preventDefault(); toggleInvincible(); }
    if (e.key === "F2") { e.preventDefault(); toggleEnemyMove(); }
    if (e.key === "F3") { e.preventDefault(); toggleAutoSpawn(); }
    if (e.key === "F4") { e.preventDefault(); spawnEnemy("melee", true); }
    if (e.key === "F5") { e.preventDefault(); spawnEnemy("ranged", true); }
    if (e.key === "F6") { e.preventDefault(); spawnEnemy("heavy", true); }
    if (e.key === "F7") { e.preventDefault(); spawnBoss(true); }
    if (e.key === "F8") { e.preventDefault(); clearEnemies(); }
    if (e.key === "F9") { e.preventDefault(); giveXp(); }
});

window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

canvas.addEventListener("mousedown", e => {
    if (e.button === 0) {
        basicAttack();
    }
});

canvas.addEventListener("contextmenu", e => {
    e.preventDefault();
        parry();
});

const overlay = document.getElementById("overlay");
const overlayTitle = document.getElementById("overlayTitle");
const overlayText = document.getElementById("overlayText");
const buttons = document.getElementById("buttons");

let gamePaused = false;
let gameOver = false;
let screenShake = 0;
let hitStop = 0;
let invincible = false;
let enemyMoveEnabled = true;
let autoSpawnEnabled = false;

function rand(min, max) {
    return Math.random() * (max - min) + min;
}

function dist(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
}

function angleTo(a, b) {
    return Math.atan2(b.y - a.y, b.x - a.x);
}

function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
}

function circleHit(a, b) {
    return dist(a, b) < a.r + b.r;
}

const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    r: 16,
    hp: 100,
    maxHp: 100,
    speed: 4,
    form: "Young Bat",
    xp: 0,
    xpToEvolve: 80,
    evolved: false,

    echoCharges: 2,
    maxEchoCharges: 2,
    echoRecharge: 0,

    dashCharges: 1,
    maxDashCharges: 1,
    dashRecharge: 0,
    dashTime: 0,
    dashVx: 0,
    dashVy: 0,
    dashInvuln: 0,

    parryTime: 0,
    perfectParryTime: 0,
    parryRecovery: 0,

    attackTime: 0,
    attackAngle: 0,
    empoweredAttack: false,

    bloodRage: 0,
    shadowHunt: 0,
    invisible: 0,
    dashHitSet: new Set(),

    hitFlash: 0,
    skillCooldown: 0,
    maxSkillCooldown: 360
};

const enemies = [];
const projectiles = [];
const effects = [];
const fallingAttacks = [];

let boss = null;
let spawnTimer = 0;

function spawnEnemy(type, atMouse = false) {
    const edge = Math.floor(Math.random() * 4);
    let x, y;

    if (atMouse) {
        x = mouse.x;
        y = mouse.y;
    } else {
        if (edge === 0) { x = rand(0, canvas.width); y = -40; }
        if (edge === 1) { x = canvas.width + 40; y = rand(0, canvas.height); }
        if (edge === 2) { x = rand(0, canvas.width); y = canvas.height + 40; }
        if (edge === 3) { x = -40; y = rand(0, canvas.height); }
    }

    if (type === "melee") {
        enemies.push({
            type,
            x, y,
            r: 14,
            hp: 35,
            maxHp: 35,
            speed: 1.6,
            attackCd: rand(40, 100),
            slow: 0,
            bloodMark: 0,
            echoMark: 0,
            shadowMark: 0,
            hitFlash: 0,
            stagger: 0
        });
    }

    if (type === "ranged") {
        enemies.push({
            type,
            x, y,
            r: 13,
            hp: 25,
            maxHp: 25,
            speed: 0.8,
            attackCd: rand(60, 130),
            slow: 0,
            bloodMark: 0,
            echoMark: 0,
            shadowMark: 0,
            hitFlash: 0,
            stagger: 0
        });
    }

    if (type === "heavy") {
        enemies.push({
            type,
            x, y,
            r: 24,
            hp: 100,
            maxHp: 100,
            speed: 0.65,
            attackCd: rand(90, 160),
            slow: 0,
            bloodMark: 0,
            echoMark: 0,
            shadowMark: 0,
            hitFlash: 0,
            stagger: 0,
            chargeTime: 0
        });
    }
}

function spawnBoss(atMouse = false) {
    boss = {
        type: "boss",
        x: atMouse ? mouse.x : canvas.width / 2,
        y: atMouse ? mouse.y : 130,
        r: 42,
        hp: 600,
        maxHp: 600,
        phase: 1,
        attackCd: 80,
        action: "idle",
        actionTime: 0,
        targetX: 0,
        targetY: 0,
        bloodMark: 0,
        echoMark: 0,
        shadowMark: 0,
        hitFlash: 0,
        stagger: 0,
        slow: 0
    };
}

function addEffect(x, y, r, color, life, text = "") {
    effects.push({ x, y, r, color, life, maxLife: life, text });
}

function formAccentColor(alpha = 1) {
    if (player.form === "Blood Bat") return `rgba(255, 50, 95, ${alpha})`;
    if (player.form === "Echo Bat") return `rgba(70, 225, 255, ${alpha})`;
    if (player.form === "Shadow Bat") return `rgba(150, 110, 255, ${alpha})`;
    return `rgba(220, 220, 255, ${alpha})`;
}

function skillName() {
    if (player.form === "Blood Bat") return "血爆";
    if (player.form === "Echo Bat") return "共振";
    if (player.form === "Shadow Bat") return "影獵";
    return "固有";
}

function getBloodBonusPercent() {
    if (player.form !== "Blood Bat") return 0;
    const missing = 1 - player.hp / player.maxHp;
    let bonus = missing * 120;
    if (player.bloodRage > 0) bonus += 25;
    return Math.max(0, Math.round(bonus));
}

function drawCooldownCircle(x, y, radius, ratio, color, label, countText, shape = "circle") {
    ctx.save();
    ctx.globalAlpha = 0.95;

    ctx.fillStyle = "rgba(0,0,0,0.48)";
    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 2;

    if (shape === "diamond") {
        ctx.beginPath();
        ctx.moveTo(x, y - radius);
        ctx.lineTo(x + radius, y);
        ctx.lineTo(x, y + radius);
        ctx.lineTo(x - radius, y);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    } else {
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
    }

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.arc(x, y, radius - 2, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * clamp(ratio, 0, 1));
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.65;
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(x, y, radius - 1, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * clamp(ratio, 0, 1));
    ctx.stroke();

    ctx.fillStyle = "white";
    ctx.font = "12px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(countText, x, y);

    ctx.font = "11px Arial";
    ctx.fillText(label, x, y + radius + 12);
    ctx.restore();
}

function drawLowHpWarning() {
    const hpRate = player.hp / player.maxHp;
    if (hpRate > 0.5 || gameOver) return;

    let alpha = 0.08;
    let line = 22;
    if (hpRate <= 0.3) {
        alpha = 0.15 + Math.sin(Date.now() / 170) * 0.05;
        line = 34;
    }
    if (hpRate <= 0.15) {
        alpha = 0.24 + Math.sin(Date.now() / 90) * 0.09;
        line = 46;
    }

    ctx.save();
    ctx.strokeStyle = `rgba(255,0,30,${alpha})`;
    ctx.lineWidth = line;
    ctx.strokeRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
}

function damageEnemy(e, amount) {
    if (player.form === "Blood Bat") {
        const missing = 1 - player.hp / player.maxHp;
        amount *= 1 + missing * 1.2;
    }

    if (player.bloodRage > 0) amount *= 1.25;
    if (player.shadowHunt > 0) amount *= 1.15;

    e.hp -= amount;
    e.hitFlash = 8;
    addEffect(e.x, e.y, amount >= 35 ? 36 : 20, amount >= 35 ? "rgba(255,255,160,0.48)" : "rgba(255,255,255,0.25)", 12, Math.floor(amount).toString());
    if (amount >= 35) addEffect(e.x, e.y, 52, "rgba(255,230,120,0.35)", 16, "重擊");

    if (e.hp <= 0) {
        if (e === boss) {
            boss = null;
            player.xp += 150;
            addEffect(canvas.width / 2, canvas.height / 2, 160, "rgba(255,220,120,0.35)", 80, "BOSS 擊敗");
        } else {
            const i = enemies.indexOf(e);
            if (i >= 0) enemies.splice(i, 1);
            player.xp += e.type === "heavy" ? 35 : 15;
        }

        checkEvolution();
    }
}

function healPlayer(amount) {
    if (player.form === "Shadow Bat") amount *= 0.35;
    if (player.form === "Echo Bat") amount *= 0.7;
    if (player.form === "Blood Bat") amount *= 1.5;
    if (player.bloodRage > 0) amount *= 1.5;

    player.hp = clamp(player.hp + amount, 0, player.maxHp);
}

function hurtPlayer(amount) {
    if (invincible) return;
    if (player.dashInvuln > 0 || player.invisible > 0) return;

    if (player.parryTime > 0) {
        const perfect = player.perfectParryTime > 0;
        successfulParry(perfect);
        return;
    }

    player.hp -= amount;
    player.hitFlash = 12;
    screenShake = Math.max(screenShake, amount >= 15 ? 16 : 10);
    addEffect(player.x, player.y, amount >= 15 ? 52 : 35, "rgba(255,0,0,0.42)", 18, amount >= 15 ? "受擊" : "");

    if (player.hp <= 0) {
        player.hp = 0;
        endGame();
    }
}

function successfulParry(perfect) {
    hitStop = perfect ? 10 : 5;
    screenShake = perfect ? 12 : 6;
    addEffect(player.x, player.y, perfect ? 90 : 58, perfect ? "rgba(255,230,80,0.85)" : "rgba(90,190,255,0.65)", perfect ? 28 : 18, perfect ? "完美彈反" : "彈反");
    addEffect(player.x, player.y, perfect ? 135 : 95, perfect ? "rgba(255,210,80,0.35)" : "rgba(80,180,255,0.28)", perfect ? 32 : 22);

    const targets = [...enemies];
    if (boss) targets.push(boss);
    for (const e of targets) {
        if (dist(player, e) < (perfect ? 150 : 105)) {
            e.stagger = perfect ? 40 : 22;
            e.hitFlash = perfect ? 12 : 7;
        }
    }

    player.parryTime = 0;
    player.parryRecovery = 0;

    if (player.form === "Blood Bat") {
        player.bloodRage = perfect ? 300 : 180;
    }

    if (player.form === "Echo Bat") {
        player.echoCharges = clamp(player.echoCharges + (perfect ? 1.5 : 0.75), 0, player.maxEchoCharges);
        addRingEcho(player.x, player.y, perfect ? 160 : 110);
    }

    if (player.form === "Shadow Bat") {
        if (perfect) {
            player.dashCharges = clamp(player.dashCharges + 1, 0, player.maxDashCharges);
            player.empoweredAttack = true;
            addEffect(player.x, player.y, 50, "rgba(120,80,255,0.5)", 18, "影步");
        } else {
            player.dashRecharge += 0.55;
        }
    }
}

function basicAttack() {
    if (gamePaused || gameOver) return;
    if (player.attackTime > 0) return;

    player.attackAngle = angleTo(player, mouse);
    player.attackTime = 12;

    const range = player.empoweredAttack ? 95 : player.form === "Blood Bat" ? 65 : 52;
    const arc = player.form === "Blood Bat" ? 1.5 : 0.9;
    const damage = player.empoweredAttack ? 36 : player.form === "Blood Bat" ? 20 : 16;

    const targets = [...enemies];
    if (boss) targets.push(boss);

    for (const e of targets) {
        const d = dist(player, e);
        const a = angleTo(player, e);
        let diff = Math.abs(Math.atan2(Math.sin(a - player.attackAngle), Math.cos(a - player.attackAngle)));

        if (d < range + e.r && diff < arc / 2) {
            damageEnemy(e, damage);
            healPlayer(player.form === "Blood Bat" ? 2.2 : 1.2);

            if (player.form === "Blood Bat") {
                e.bloodMark++;
                if (e.bloodMark >= 5) {
                    e.bloodMark = 0;
                    damageEnemy(e, 18);
                    healPlayer(10);
                    addEffect(e.x, e.y, 55, "rgba(255,0,80,0.45)", 24, "血印爆發");
                }
            }

            if (player.form === "Shadow Bat" && player.empoweredAttack) {
                const backAngle = angleTo(e, player);
                player.x = e.x - Math.cos(backAngle) * 45;
                player.y = e.y - Math.sin(backAngle) * 45;
                damageEnemy(e, 22);
                addEffect(e.x, e.y, 60, "rgba(120,80,255,0.45)", 20, "背刺");
            }
        }
    }

    player.empoweredAttack = false;
}

function dash() {
    if (gamePaused || gameOver) return;
    if (player.dashCharges < 1) return;

    const a = angleTo(player, mouse);
    player.dashCharges--;
    player.dashHitSet.clear();
    player.dashTime = 10;
    player.dashInvuln = player.form === "Shadow Bat" ? 14 : 5;
    player.dashVx = Math.cos(a) * (player.form === "Shadow Bat" ? 15 : 11);
    player.dashVy = Math.sin(a) * (player.form === "Shadow Bat" ? 15 : 11);

    if (player.form === "Shadow Bat") {
        player.empoweredAttack = true;
    }

    addEffect(player.x, player.y, 28, "rgba(120,120,255,0.28)", 12);
}

function echoWave() {
    if (gamePaused || gameOver) return;
    if (player.echoCharges < 1) return;

    player.echoCharges--;

    const a = angleTo(player, mouse);
    const isEcho = player.form === "Echo Bat";

    projectiles.push({
        owner: "playerEcho",
        x: player.x,
        y: player.y,
        r: isEcho ? 14 : 8,
        vx: Math.cos(a) * 9,
        vy: Math.sin(a) * 9,
        life: isEcho ? 80 : 55,
        damage: isEcho ? 16 : 10,
        pierce: isEcho ? 4 : 0,
        slow: isEcho ? 140 : 90,
        color: isEcho ? "#4fe3ff" : "#82dfff",
        hitSet: new Set()
    });

    addEffect(player.x, player.y, 28, "rgba(100,220,255,0.35)", 12);
}

function addRingEcho(x, y, radius) {
    addEffect(x, y, radius, "rgba(80,220,255,0.35)", 25, "回聲");

    const targets = [...enemies];
    if (boss) targets.push(boss);

    for (const e of targets) {
        if (Math.hypot(e.x - x, e.y - y) < radius + e.r) {
            applyEchoMark(e);
            e.slow = 120;
            damageEnemy(e, 10);
        }
    }
}

function parry() {
    if (gamePaused || gameOver) return;
    if (player.parryRecovery > 0) return;

    player.parryTime = 18;
    player.perfectParryTime = 6;
    player.parryRecovery = 24;

    addEffect(player.x, player.y, 35, "rgba(180,220,255,0.25)", 10);
}

function useSkill() {
    if (gamePaused || gameOver) return;
    if (player.form === "Young Bat") {
        addEffect(player.x, player.y, 65, "rgba(255,255,255,0.25)", 24, "尚未進化");
        return;
    }
    if (player.skillCooldown > 0) {
        addEffect(player.x, player.y, 55, "rgba(255,255,255,0.18)", 20, "冷卻中");
        return;
    }
    let usedSkill = false;

    if (player.form === "Blood Bat") {
        const cost = player.maxHp * 0.15;
        if (player.hp > 1) {
            player.hp = Math.max(1, player.hp - cost);
            player.bloodRage = 240;
            addEffect(player.x, player.y, 120, "rgba(255,0,80,0.45)", 35, "血爆");

            const targets = [...enemies];
            if (boss) targets.push(boss);
            for (const e of targets) {
                if (dist(player, e) < 120 + e.r) damageEnemy(e, 45);
            }
            usedSkill = true;
        }
    }

    if (player.form === "Echo Bat") {
        addEffect(player.x, player.y, 120, "rgba(80,220,255,0.45)", 35, "共振爆發");

        const targets = [...enemies];
        if (boss) targets.push(boss);

        for (const e of targets) {
            if (e.echoMark > 0) {
                damageEnemy(e, 15 + e.echoMark * 18);
                e.echoMark++;
                if (e.echoMark >= 4) explodeEchoMark(e);
            }
        }
        usedSkill = true;
    }

    if (player.form === "Shadow Bat") {
        player.shadowHunt = 240;
        player.invisible = 90;
        player.dashCharges = clamp(player.dashCharges + 1, 0, player.maxDashCharges);
        player.empoweredAttack = true;
        addEffect(player.x, player.y, 80, "rgba(120,80,255,0.55)", 35, "影獵");
        usedSkill = true;
    }

    if (usedSkill) {
        player.skillCooldown = player.maxSkillCooldown;
    }
}

function formName(form = player.form) {
    if (form === "Young Bat") return "幼蝠";
    if (form === "Blood Bat") return "血蝠";
    if (form === "Echo Bat") return "回聲蝠";
    if (form === "Shadow Bat") return "影蝠";
    return form;
}

function updateTrainerButtonLabels() {
    const invBtn = document.getElementById("btnInvincible");
    const moveBtn = document.getElementById("btnEnemyMove");
    const spawnBtn = document.getElementById("btnAutoSpawn");

    if (invBtn) invBtn.textContent = "F1 無敵：" + (invincible ? "ON" : "OFF");
    if (moveBtn) moveBtn.textContent = "F2 敵人移動：" + (enemyMoveEnabled ? "ON" : "OFF");
    if (spawnBtn) spawnBtn.textContent = "F3 自動生怪：" + (autoSpawnEnabled ? "ON" : "OFF");
}

function toggleInvincible(btn) {
    invincible = !invincible;
    updateTrainerButtonLabels();
}

function toggleEnemyMove(btn) {
    enemyMoveEnabled = !enemyMoveEnabled;
    updateTrainerButtonLabels();
}

function toggleAutoSpawn(btn) {
    autoSpawnEnabled = !autoSpawnEnabled;
    updateTrainerButtonLabels();
}

function setForm(form) {
    player.form = form;
    player.evolved = form !== "Young Bat";

    player.maxHp = form === "Blood Bat" ? 120 : 100;
    player.hp = player.maxHp;
    player.speed = form === "Shadow Bat" ? 4.5 : 4;

    player.maxEchoCharges = form === "Echo Bat" ? 4 : 2;
    player.echoCharges = player.maxEchoCharges;
    player.echoRecharge = 0;

    player.maxDashCharges = form === "Shadow Bat" ? 2 : 1;
    player.dashCharges = player.maxDashCharges;
    player.dashRecharge = 0;

    player.empoweredAttack = false;
    player.bloodRage = 0;
    player.shadowHunt = 0;
    player.invisible = 0;
    player.hitFlash = 0;
    player.skillCooldown = 0;

    overlay.style.display = "none";
    gamePaused = false;
    addEffect(player.x, player.y, 100, "rgba(255,255,255,0.35)", 40, formName(form));
}

function clearEnemies() {
    enemies.length = 0;
    projectiles.length = 0;
    fallingAttacks.length = 0;
    effects.length = 0;
    boss = null;
}

function giveXp() {
    if (!player.evolved) {
        player.xp = player.xpToEvolve;
        checkEvolution();
    }
}

function checkEvolution() {
    if (!player.evolved && player.xp >= player.xpToEvolve) {
        gamePaused = true;
        overlay.style.display = "flex";
        overlayTitle.textContent = "選擇進化";
        overlayText.textContent = "幼蝠即將進化，選擇一條戰鬥路線。";
        buttons.innerHTML = "";

        addButton("血蝠", "血量越低傷害越高。血印、吸血、血爆。", () => evolve("Blood Bat"));
        addButton("回聲蝠", "聲波更遠更廣，可疊回聲印記與共振爆發。", () => evolve("Echo Bat"));
        addButton("影蝠", "兩段衝刺、強化普攻、背刺與影獵。", () => evolve("Shadow Bat"));
    }
}

function addButton(title, desc, fn) {
    const b = document.createElement("button");
    b.innerHTML = `<strong>${title}</strong><br><small>${desc}</small>`;
    b.onclick = fn;
    buttons.appendChild(b);
}

function evolve(form) {
    player.form = form;
    player.evolved = true;

    if (form === "Blood Bat") {
        player.maxHp = 120;
        player.hp = 120;
    }

    if (form === "Echo Bat") {
        player.maxEchoCharges = 4;
        player.echoCharges = 4;
    }

    if (form === "Shadow Bat") {
        player.maxDashCharges = 2;
        player.dashCharges = 2;
        player.speed = 4.5;
    }

    overlay.style.display = "none";
    gamePaused = false;
    addEffect(player.x, player.y, 120, "rgba(255,255,255,0.35)", 60, formName(form));
}

function applyEchoMark(e) {
    e.echoMark++;

    if (player.form === "Echo Bat") {
        player.echoRecharge += 0.2;
    }

    if (e.echoMark >= 4) {
        explodeEchoMark(e);
    }
}

function explodeEchoMark(e) {
    e.echoMark = 0;
    damageEnemy(e, 40);
    e.slow = 180;
    addEffect(e.x, e.y, 70, "rgba(80,220,255,0.5)", 25, "爆炸");

    const targets = [...enemies];
    if (boss) targets.push(boss);

    let nearest = null;
    let nearestD = Infinity;

    for (const t of targets) {
        if (t !== e && t.hp > 0) {
            const d = dist(e, t);
            if (d < nearestD) {
                nearestD = d;
                nearest = t;
            }
        }
    }

    if (nearest && nearestD < 220) {
        applyEchoMark(nearest);
    }
}

function applyShadowMark(e) {
    e.shadowMark++;

    if (e.shadowMark >= 3) {
        e.shadowMark = 0;
        player.dashCharges = clamp(player.dashCharges + 1, 0, player.maxDashCharges);
        damageEnemy(e, 25);
        addEffect(e.x, e.y, 65, "rgba(120,80,255,0.5)", 25, "衝刺回復");
    }
}

function updatePlayer() {
    if (player.parryTime > 0) player.parryTime--;
    if (player.perfectParryTime > 0) player.perfectParryTime--;
    if (player.parryRecovery > 0) player.parryRecovery--;
    if (player.attackTime > 0) player.attackTime--;
    if (player.dashInvuln > 0) player.dashInvuln--;
    if (player.bloodRage > 0) player.bloodRage--;
    if (player.shadowHunt > 0) player.shadowHunt--;
    if (player.invisible > 0) player.invisible--;
    if (player.hitFlash > 0) player.hitFlash--;
    if (player.skillCooldown > 0) player.skillCooldown--;

    if (player.dashTime > 0) {
        player.x += player.dashVx;
        player.y += player.dashVy;
        player.dashTime--;

        const targets = [...enemies];
        if (boss) targets.push(boss);

        for (const e of targets) {
            if (circleHit(player, e)) {

                // 同一次衝刺中，已經命中的敵人不再重複觸發
                if (player.dashHitSet.has(e)) continue;
                player.dashHitSet.add(e);

                if (player.form === "Shadow Bat") {
                    damageEnemy(e, 20);
                    applyShadowMark(e);
                    addEffect(e.x, e.y, 35, "rgba(120,80,255,0.35)", 15);
                } else {
                    damageEnemy(e, 14);
                    hurtPlayer(5);
                }
            }
        }
    } else {
        let vx = 0, vy = 0;
        if (keys["w"] || keys["arrowup"]) vy--;
        if (keys["s"] || keys["arrowdown"]) vy++;
        if (keys["a"] || keys["arrowleft"]) vx--;
        if (keys["d"] || keys["arrowright"]) vx++;

        const len = Math.hypot(vx, vy);
        if (len > 0) {
            vx /= len;
            vy /= len;
            let spd = player.speed;
            if (player.shadowHunt > 0) spd += 1.2;
            player.x += vx * spd;
            player.y += vy * spd;
        }
    }

    player.x = clamp(player.x, 20, canvas.width - 20);
    player.y = clamp(player.y, 20, canvas.height - 20);

    player.echoRecharge += 0.006;
    if (player.echoRecharge >= 1) {
        player.echoRecharge = 0;
        player.echoCharges = clamp(player.echoCharges + 1, 0, player.maxEchoCharges);
    }

    player.dashRecharge += 0.012;
    if (player.dashRecharge >= 1) {
        player.dashRecharge = 0;
        player.dashCharges = clamp(player.dashCharges + 1, 0, player.maxDashCharges);
    }
}

function updateEnemies() {
    for (const e of enemies) {
        if (e.slow > 0) e.slow--;
        if (e.hitFlash > 0) e.hitFlash--;
        if (e.stagger > 0) e.stagger--;

        const spd = e.stagger > 0 ? 0 : e.speed * (e.slow > 0 ? 0.45 : 1);

        // 影獵隱形修正：
        // 沒隱形時，敵人會持續記錄玩家最後位置。
        // 隱形時，敵人只會追最後看到的位置，不會即時鎖定玩家。
        if (player.invisible <= 0) {
            e.lastSeenX = player.x;
            e.lastSeenY = player.y;
        }

        const target = {
            x: e.lastSeenX ?? player.x,
            y: e.lastSeenY ?? player.y
        };

        const a = angleTo(e, target);

        if (e.type === "melee") {
            const targetDistance = dist(e, target);

            if (enemyMoveEnabled && targetDistance > 8) {
                e.x += Math.cos(a) * spd;
                e.y += Math.sin(a) * spd;
            }

            e.attackCd--;
            if (player.invisible <= 0 && circleHit(e, player) && e.attackCd <= 0) {
                hurtPlayer(10);
                e.attackCd = 60;
            }
        }

        if (e.type === "ranged") {
            const d = dist(e, target);
            if (enemyMoveEnabled) {
                if (d > 260) {
                    e.x += Math.cos(a) * spd;
                    e.y += Math.sin(a) * spd;
                } else if (d < 160) {
                    e.x -= Math.cos(a) * spd;
                    e.y -= Math.sin(a) * spd;
                }
            }

            e.attackCd--;
            if (e.attackCd <= 0) {
                shootProjectile(e.x, e.y, a, 4.5, 7, "enemy", "#ff4e6a", 220);
                e.attackCd = 100;
            }
        }

        if (e.type === "heavy") {
            const targetDistance = dist(e, target);

            if (enemyMoveEnabled && targetDistance > 8) {
                e.x += Math.cos(a) * spd;
                e.y += Math.sin(a) * spd;
            }

            e.attackCd--;
            if (e.attackCd <= 0) {
                shootProjectile(e.x, e.y, a, 7, 14, "enemy", "#ff9550", 70);
                e.attackCd = 150;
            }

            if (player.invisible <= 0 && circleHit(e, player)) hurtPlayer(14);
        }
    }
}

function shootProjectile(x, y, a, speed, damage, owner, color, life) {
    projectiles.push({
        owner,
        x, y,
        r: owner === "enemy" ? 7 : 8,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed,
        damage,
        color,
        life,
        pierce: 0,
        slow: 0,
        hitSet: new Set()
    });
}

function updateProjectiles() {
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;

        if (p.owner === "enemy") {
            if (circleHit(p, player)) {
                if (player.parryTime > 0) {
                    successfulParry(player.perfectParryTime > 0);
                    projectiles.splice(i, 1);
                    continue;
                } else {
                    hurtPlayer(p.damage);
                    projectiles.splice(i, 1);
                    continue;
                }
            }
        }

        if (p.owner === "playerEcho") {
            const targets = [...enemies];
            if (boss) targets.push(boss);

            for (const e of targets) {
                if (p.hitSet.has(e)) continue;

                if (circleHit(p, e)) {
                    p.hitSet.add(e);
                    damageEnemy(e, p.damage);
                    e.slow = p.slow;
                    player.echoRecharge += player.form === "Echo Bat" ? 0.2 : 0.08;

                    if (player.form === "Echo Bat") applyEchoMark(e);

                    if (p.pierce > 0) {
                        p.pierce--;
                    } else {
                        projectiles.splice(i, 1);
                    }
                    break;
                }
            }
        }

        if (p.life <= 0 || p.x < -100 || p.x > canvas.width + 100 || p.y < -100 || p.y > canvas.height + 100) {
            projectiles.splice(i, 1);
        }
    }
}

function updateBoss() {
    if (!boss) return;

    if (boss.slow > 0) boss.slow--;
    if (boss.hitFlash > 0) boss.hitFlash--;
    if (boss.stagger > 0) boss.stagger--;
    if (boss.stagger > 0) return;

    if (boss.hp < boss.maxHp * 0.5 && boss.phase === 1) {
        boss.phase = 2;
        addEffect(boss.x, boss.y, 150, "rgba(255,50,50,0.45)", 60, "第二階段");
        screenShake = 18;
    }

    if (boss.actionTime > 0) {
        boss.actionTime--;

        if (boss.action === "charge") {
            const a = angleTo(boss, { x: boss.targetX, y: boss.targetY });
            if (enemyMoveEnabled) {
                boss.x += Math.cos(a) * 9;
                boss.y += Math.sin(a) * 9;
            }
            if (circleHit(boss, player)) hurtPlayer(22);
        }

        return;
    }

    boss.attackCd--;

    if (boss.attackCd > 0) return;

    const choices = boss.phase === 1
        ? ["swipe", "shot", "ring"]
        : ["swipe", "shot", "ring", "charge", "fall"];

    const attack = choices[Math.floor(Math.random() * choices.length)];

    if (attack === "swipe") {
        addEffect(boss.x, boss.y, 90, "rgba(255,255,255,0.25)", 16, "揮擊");
        if (dist(boss, player) < 95) hurtPlayer(16);
        boss.attackCd = 75;
    }

    if (attack === "shot") {
        const a = angleTo(boss, player);
        shootProjectile(boss.x, boss.y, a, 7, 13, "enemy", "#ff3d3d", 180);
        boss.attackCd = 80;
    }

    if (attack === "ring") {
        for (let i = 0; i < 18; i++) {
            const a = Math.PI * 2 * i / 18;
            shootProjectile(boss.x, boss.y, a, 3.5, 8, "enemy", "#ff80aa", 220);
        }
        boss.attackCd = 120;
    }

    if (attack === "charge") {
        boss.targetX = player.x;
        boss.targetY = player.y;
        boss.action = "charge";
        boss.actionTime = 35;
        addEffect(boss.x, boss.y, 90, "rgba(255,120,40,0.35)", 20, "衝撞");
        boss.attackCd = 130;
    }

    if (attack === "fall") {
        for (let i = 0; i < 3; i++) {
            fallingAttacks.push({
                x: player.x + rand(-80, 80),
                y: player.y + rand(-80, 80),
                r: 42,
                time: 55 + i * 18
            });
        }
        boss.attackCd = 150;
    }

    const a = angleTo(boss, player);
    const spd = boss.phase === 2 ? 1.25 : 0.85;
    if (enemyMoveEnabled) {
        boss.x += Math.cos(a) * spd;
        boss.y += Math.sin(a) * spd;
    }
}

function updateFallingAttacks() {
    for (let i = fallingAttacks.length - 1; i >= 0; i--) {
        const f = fallingAttacks[i];
        f.time--;

        if (f.time <= 0) {
            addEffect(f.x, f.y, f.r, "rgba(255,80,40,0.45)", 20);
            if (dist(f, player) < f.r + player.r) hurtPlayer(18);
            fallingAttacks.splice(i, 1);
        }
    }
}

function updateEffects() {
    for (let i = effects.length - 1; i >= 0; i--) {
        effects[i].life--;
        if (effects[i].life <= 0) effects.splice(i, 1);
    }
}

function updateSpawning() {
    if (!autoSpawnEnabled) return;

    spawnTimer--;

    if (spawnTimer <= 0) {
        if (enemies.length < 10) {
            spawnEnemy("melee");
        }
        spawnTimer = 70;
    }

    // 訓練場預設不自動出 Boss，需要時可用右上角按鈕手動放置。
}

function drawUI() {
    ctx.save();
    ctx.font = "16px Arial";
    ctx.fillStyle = "white";    

    // 右上角版本資訊
    ctx.save();
    ctx.font = "14px Arial";
    ctx.textAlign = "right";
    ctx.fillStyle = "rgba(255,255,255,0.75)";
    ctx.fillText("ECHO OF THE BAT", canvas.width - 20, 26);
    ctx.fillText(GAME_VERSION, canvas.width - 20, 46);
    ctx.fillText("更新：" + BUILD_DATE, canvas.width - 20, 66);
    ctx.restore();

    ctx.fillText("蝙蝠回聲 ECHO OF THE BAT｜訓練場版", 20, 26);
    ctx.fillText("移動：WASD｜普攻：左鍵｜彈反：右鍵｜衝刺：Space｜聲波：E｜固有技能：Q",20,52);
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fillStyle = "white";

    drawBar(20, 70, 240, 18, player.hp / player.maxHp, "#c92a4b", "生命");
    drawBar(20, 96, 240, 14, player.xp / player.xpToEvolve, "#f5c542", "經驗");

    ctx.fillStyle = "white";
    ctx.fillText(`型態：${formName()}`, 20, 135);
    ctx.fillText(`聲波：${Math.floor(player.echoCharges)} / ${player.maxEchoCharges}　衝刺：${Math.floor(player.dashCharges)} / ${player.maxDashCharges}`, 20, 160);

    if (player.form === "Blood Bat") {
        ctx.fillStyle = "#ff5b83";
        ctx.fillText(`血怒增傷：+${getBloodBonusPercent()}%`, 20, 185);
    }
    if (player.bloodRage > 0) ctx.fillText("血怒狀態中", 20, 210);
    if (player.shadowHunt > 0) ctx.fillText("影獵狀態中", 20, 210);

    drawSkillIcon(26, 226);

    if (boss) {
        drawBar(canvas.width / 2 - 220, 25, 440, 18, boss.hp / boss.maxHp, "#9b2cff", `Boss 第 ${boss.phase} 階段`);
    }

    ctx.restore();
}

function drawSkillIcon(x, y) {
    const size = 54;
    const ready = player.form !== "Young Bat" && player.skillCooldown <= 0;
    const ratio = player.maxSkillCooldown ? 1 - player.skillCooldown / player.maxSkillCooldown : 1;

    ctx.save();
    ctx.fillStyle = ready ? formAccentColor(0.75) : "rgba(80,80,90,0.72)";
    ctx.strokeStyle = ready ? formAccentColor(1) : "rgba(180,180,190,0.5)";
    ctx.lineWidth = 2;
    ctx.fillRect(x, y, size, size);
    ctx.strokeRect(x, y, size, size);

    if (!ready) {
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(x, y, size, size * (1 - ratio));
    }

    ctx.fillStyle = "white";
    ctx.font = "12px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Q", x + size / 2, y + 16);
    ctx.font = "13px Arial";
    ctx.fillText(skillName(), x + size / 2, y + 36);

    if (player.skillCooldown > 0) {
        ctx.font = "bold 18px Arial";
        ctx.fillText(Math.ceil(player.skillCooldown / 60), x + size / 2, y + size / 2 + 7);
    }

    ctx.textAlign = "left";
    ctx.restore();
}

function drawBar(x, y, w, h, t, color, label) {
    ctx.fillStyle = "#222";
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w * clamp(t, 0, 1), h);
    ctx.strokeStyle = "#fff";
    ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = "#fff";
    ctx.font = "12px Arial";
    ctx.fillText(label, x + 6, y + h - 4);
}

function drawPlayer() {
    ctx.save();
    ctx.translate(player.x, player.y);

    if (player.invisible > 0) ctx.globalAlpha = 0.35;

    if (player.hitFlash > 0) {
        ctx.fillStyle = "#ffffff";
    } else {
        ctx.fillStyle =
            player.form === "Blood Bat" ? "#d92f5d" :
            player.form === "Echo Bat" ? "#38d8ff" :
            player.form === "Shadow Bat" ? "#7c5cff" :
            "#d8d8ff";
    }

    ctx.beginPath();
    ctx.arc(0, 0, player.r, 0, Math.PI * 2);
    ctx.fill();

    const a = angleTo(player, mouse);
    ctx.rotate(a);
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.beginPath();
    ctx.moveTo(18, 0);
    ctx.lineTo(6, -6);
    ctx.lineTo(6, 6);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    if (player.attackTime > 0) {
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.attackAngle);
        ctx.strokeStyle = player.empoweredAttack ? "#a48cff" : "#ffffff";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, player.empoweredAttack ? 95 : player.form === "Blood Bat" ? 65 : 52, -0.45, 0.45);
        ctx.stroke();
        ctx.restore();
    }

    if (player.parryTime > 0) {
        const pRatio = player.parryTime / 18;
        ctx.save();
        ctx.strokeStyle = player.perfectParryTime > 0 ? "#fff27a" : "#9edcff";
        ctx.fillStyle = player.perfectParryTime > 0 ? "rgba(255,240,120,0.12)" : "rgba(90,190,255,0.10)";
        ctx.lineWidth = player.perfectParryTime > 0 ? 5 : 3;
        ctx.beginPath();
        ctx.arc(player.x, player.y, 34 + (1 - pRatio) * 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
    }

    drawPlayerResourceIcons();
}

function drawPlayerResourceIcons() {
    const baseX = player.x;
    const baseY = player.y;

    // 聲波：圓形，顯示當前格數與下一格回復進度
    for (let i = 0; i < player.maxEchoCharges; i++) {
        const filled = i < Math.floor(player.echoCharges);
        const recharging = !filled && i === Math.floor(player.echoCharges);
        const ratio = filled ? 1 : recharging ? player.echoRecharge : 0;
        drawCooldownCircle(baseX - 38 + i * 22, baseY - 48, 9, ratio, "rgba(75,225,255,0.9)", "", filled ? "●" : "", "circle");
    }

    // 衝刺：菱形，顯示當前格數與下一格回復進度
    for (let i = 0; i < player.maxDashCharges; i++) {
        const filled = i < Math.floor(player.dashCharges);
        const recharging = !filled && i === Math.floor(player.dashCharges);
        const ratio = filled ? 1 : recharging ? player.dashRecharge : 0;
        drawCooldownCircle(baseX - 22 + i * 25, baseY + 48, 10, ratio, "rgba(165,135,255,0.9)", "", filled ? "◆" : "", "diamond");
    }
}


function drawEnemies() {
    for (const e of enemies) {
        ctx.fillStyle = e.hitFlash > 0 ? "#ffffff" :
            e.type === "melee" ? "#ff6b6b" :
            e.type === "ranged" ? "#ffb347" :
            "#b45cff";

        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
        ctx.fill();

        drawMarks(e);

        ctx.fillStyle = "#222";
        ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2, 4);
        ctx.fillStyle = "#6cff6c";
        ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2 * (e.hp / e.maxHp), 4);
    }

    if (boss) {
        ctx.fillStyle = boss.hitFlash > 0 ? "#ffffff" : boss.phase === 1 ? "#7b2cff" : "#ff2f68";
        ctx.beginPath();
        ctx.arc(boss.x, boss.y, boss.r, 0, Math.PI * 2);
        ctx.fill();

        drawMarks(boss);
    }
}

function drawMarks(e) {
    ctx.font = "12px Arial";
    ctx.textAlign = "center";

    if (e.bloodMark > 0) {
        ctx.fillStyle = "#ff4c7a";
        ctx.fillText("血" + e.bloodMark, e.x - 16, e.y - e.r - 16);
    }

    if (e.echoMark > 0) {
        ctx.fillStyle = "#4fe3ff";
        ctx.fillText("聲" + e.echoMark, e.x, e.y - e.r - 16);
    }

    if (e.shadowMark > 0) {
        ctx.fillStyle = "#a48cff";
        ctx.fillText("影" + e.shadowMark, e.x + 16, e.y - e.r - 16);
    }

    ctx.textAlign = "left";
}

function drawProjectiles() {
    for (const p of projectiles) {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawFallingAttacks() {
    for (const f of fallingAttacks) {
        ctx.strokeStyle = "rgba(255,80,40,0.8)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "rgba(255,80,40,0.15)";
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r * (1 - f.time / 70), 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawEffects() {
    for (const ef of effects) {
        const t = ef.life / ef.maxLife;
        ctx.globalAlpha = t;
        ctx.strokeStyle = ef.color;
        ctx.fillStyle = ef.color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(ef.x, ef.y, ef.r * (1 + (1 - t) * 0.6), 0, Math.PI * 2);
        ctx.stroke();

        if (ef.text) {
            ctx.fillStyle = "white";
            ctx.font = "18px Arial";
            ctx.textAlign = "center";
            ctx.fillText(ef.text, ef.x, ef.y - ef.r * 0.4);
            ctx.textAlign = "left";
        }

        ctx.globalAlpha = 1;
    }
}

function update() {
    if (gamePaused || gameOver) return;

    if (hitStop > 0) {
        hitStop--;
        return;
    }

    updatePlayer();
    updateEnemies();
    updateBoss();
    updateProjectiles();
    updateFallingAttacks();
    updateEffects();
    updateSpawning();
}

function draw() {
    ctx.save();

    if (screenShake > 0) {
        screenShake--;
        ctx.translate(rand(-screenShake, screenShake), rand(-screenShake, screenShake));
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawFallingAttacks();
    drawProjectiles();
    drawEnemies();
    drawPlayer();
    drawEffects();

    ctx.restore();

    drawLowHpWarning();
    drawUI();
}

function endGame() {
    gameOver = true;
    overlay.style.display = "flex";
    overlayTitle.textContent = "遊戲結束";
    overlayText.textContent = `你達到的型態：${formName()}，經驗：${player.xp}`;
    buttons.innerHTML = "";
    addButton("重新開始", "再玩一次", () => location.reload());
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// 訓練場預設空場，請用右上角按鈕手動放置敵人。
loop();
</script>
